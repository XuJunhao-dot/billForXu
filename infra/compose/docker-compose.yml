services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [appnet]

  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql://app:app@db:5432/app
      # JWT_SECRET: ${JWT_SECRET:-change_me}
      # CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks: [appnet]

  web:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    depends_on:
      - api
    ports:
      - "80:80"
    networks: [appnet]

volumes:
  pgdata:

networks:
  appnet:
