services:
  api:
    image: billforxu-api:latest
    build:
      context: ../../backend
    restart: unless-stopped
    environment:
      PORT: 8080
      # Optional: set a pre-shared token to protect API when exposed
      # APP_TOKEN: "change-me"
    volumes:
      - api_data:/app/data
    expose:
      - "8080"
    networks: [appnet]

  web:
    image: billforxu-web:latest
    build:
      context: ../../frontend
    restart: unless-stopped
    environment:
      # Keep empty to use same-origin (/api -> api)
      NEXT_PUBLIC_API_BASE: ""
    expose:
      - "3000"
    networks: [appnet]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [appnet]

volumes:
  api_data:
  caddy_data:
  caddy_config:

networks:
  appnet:
