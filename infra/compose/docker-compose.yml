services:
  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    environment:
      PORT: 8080
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks: [appnet]

  web:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    depends_on:
      - api
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8080
    networks: [appnet]

networks:
  appnet:
